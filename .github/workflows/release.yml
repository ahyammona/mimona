name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  # ── Windows .exe ───────────────────────────────────────────────────────────
  windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload .exe to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: target/x86_64-pc-windows-msvc/release/mimona.exe
          generate_release_notes: false

  # ── Linux binary ───────────────────────────────────────────────────────────
  build:
    name: Build Linux binary
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev \
            libegl1-mesa-dev libgles2-mesa-dev

      - name: Build
        run: cargo build --release

      - name: Rename binary
        run: |
          cp target/release/mimona mimona-linux-x86_64
          chmod +x mimona-linux-x86_64

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: mimona-linux-x86_64
          generate_release_notes: true

  # ── .deb installer (Ubuntu/Debian) ────────────────────────────────────────
  linux-deb:
    name: Linux Installer (.deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev \
            libegl1-mesa-dev libgles2-mesa-dev

      - name: Build release binary
        run: cargo build --release

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: target/debian/*.deb
          generate_release_notes: false

  # ── Assets bundle (whatsapp-bridge + frontend) ────────────────────────────
  bundle:
    name: Bundle assets
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bridge dependencies
        run: |
          cd whatsapp-bridge
          git config --global url."https://".insteadOf git://
          npm install --ignore-scripts

      - name: Create assets bundle
        run: |
          mkdir -p mimona-assets
          cp -r whatsapp-bridge mimona-assets/whatsapp-bridge
          rm -rf mimona-assets/whatsapp-bridge/auth_sessions
          rm -f  mimona-assets/whatsapp-bridge/.env
          cp -r frontend mimona-assets/frontend
          cp registry.json mimona-assets/
          cp install.sh mimona-assets/
          zip -r mimona-assets.zip mimona-assets

      - name: Upload assets bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: mimona-assets.zip
          generate_release_notes: false