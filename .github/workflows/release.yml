name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: mimona-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mimona-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mimona-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mimona-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/mimona ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/mimona.exe ${{ matrix.artifact }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.artifact }}
          generate_release_notes: true

  bundle:
    name: Bundle assets
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bridge dependencies
        run: |
          cd whatsapp-bridge
          git config --global url."https://".insteadOf git://
          npm install --ignore-scripts

      - name: Create assets bundle
        run: |
          mkdir -p mimona-assets
          cp -r whatsapp-bridge mimona-assets/whatsapp-bridge
          rm -rf mimona-assets/whatsapp-bridge/auth_sessions
          rm -f  mimona-assets/whatsapp-bridge/.env
          cp -r frontend mimona-assets/frontend
          cp registry.json mimona-assets/
          cp install.sh mimona-assets/
          zip -r mimona-assets.zip mimona-assets

      - name: Upload assets bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: mimona-assets.zip
          generate_release_notes: false